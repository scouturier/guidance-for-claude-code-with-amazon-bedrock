version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps): update github-actions"
    groups:
      github-actions-version-updates:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/source"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps): update pip"
    groups:
      pip-version-updates:
        patterns: ["*"]
